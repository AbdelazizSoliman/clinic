name: CI

on:
  pull_request:
  push:
    branches: [ main, start-final-qa-deployment-launch ]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build --tag clinic:${{ github.sha }} .

      - name: Verify runtime image
        run: |
          image="clinic:${GITHUB_SHA}"
          test "$(docker run --rm --entrypoint id "$image" -u)" != "0"
          docker run --rm --entrypoint bundle "$image" check
          ! docker run --rm --entrypoint bundle "$image" list | grep -E ' debug | capybara | selenium-webdriver | web-console '
          docker run --rm --entrypoint ./bin/rails -e SECRET_KEY_BASE_DUMMY=1 "$image" runner 'Rails.application.eager_load!; puts "production_boot=ok"'

      - name: Verify container health
        run: |
          image="clinic:${GITHUB_SHA}"
          container=$(docker run --detach --publish 127.0.0.1:3000:3000 -e SECRET_KEY_BASE_DUMMY=1 "$image")
          trap 'docker logs "$container"; docker rm --force "$container"' EXIT
          for attempt in {1..30}; do
            status=$(docker inspect --format='{{.State.Health.Status}}' "$container")
            [ "$status" = healthy ] && exit 0
            [ "$status" = unhealthy ] && exit 1
            sleep 2
          done
          exit 1

  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Audit resolved Ruby dependencies
        run: bundle exec bundler-audit check --update

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

      # redis:
      #   image: redis
      #   ports:
      #     - 6379:6379
      #   options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y google-chrome-stable curl libjemalloc2 libvips postgresql-client

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          # REDIS_URL: redis://localhost:6379/0
        run: bin/rails db:test:prepare test test:system

      - name: Verify framework loading, migrations, Tailwind, and production assets
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
        run: |
          bin/rails zeitwerk:check
          bin/rails db:abort_if_pending_migrations
          bin/rails tailwindcss:build
          SECRET_KEY_BASE_DUMMY=1 RAILS_ENV=production bin/rails assets:precompile
          bin/rails routes >/dev/null

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
