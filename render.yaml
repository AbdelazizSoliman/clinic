services:
  - type: web
    name: clinic-web
    runtime: docker
    healthCheckPath: /up
    preDeployCommand: bin/rails db:prepare
    envVars: &environment
      - key: DATABASE_URL
        fromDatabase: { name: clinic-db, property: connectionString }
      - key: APP_HOST
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SMTP_ADDRESS
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: STORAGE_REGION
        sync: false
      - key: STORAGE_BUCKET
        sync: false
  - type: worker
    name: clinic-worker
    runtime: docker
    dockerCommand: bin/jobs start
    envVars: *environment
databases:
  - name: clinic-db
    databaseName: clinic
    user: clinic
