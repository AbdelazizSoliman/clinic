production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  expire_inventory_reservations:
    class: ExpireInventoryReservationsJob
    queue: maintenance
    schedule: every 5 minutes
  expire_invitations:
    class: ExpireInvitationsJob
    queue: maintenance
    schedule: every hour at minute 20
  cleanup_expired_report_exports:
    class: Reports::CleanupExpiredExportsJob
    queue: maintenance
    schedule: every day at 2:30am
